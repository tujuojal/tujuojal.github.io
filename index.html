<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d1b2a">
  <title>PowSurf - Snowboard Slope Finder</title>
  <link rel="stylesheet" href="leaflet.css">
  <link rel="stylesheet" href="maplibre-gl.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M3 18L12 4L21 18' stroke='%234fc3f7' stroke-width='2' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
</head>
<body>
  <div id="app">

    <!-- Map -->
    <div id="map"></div>
    <!-- 3D terrain view (MapLibre GL JS) -->
    <div id="map-3d" class="hidden"></div>

    <!-- Top bar -->
    <header id="topbar">
      <div id="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 18L12 4L21 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M7 14L12 9L17 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
        </svg>
        <span class="logo-text">PowSurf</span>
      </div>
      <div id="topbar-actions">
        <button id="btn-locate" class="icon-btn" title="My location" aria-label="Go to my location">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-shadow" class="icon-btn" title="Sun shadow overlay" aria-label="Toggle sun shadow overlay">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-compass" class="icon-btn" title="Reset north (tap) · Two-finger rotate on map" aria-label="Reset map to north">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="transition: transform 0.2s ease">
            <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
            <!-- north needle – accent colour -->
            <path d="M12 4 L10.5 12 L12 10.5 L13.5 12 Z" fill="var(--accent)"/>
            <!-- south needle – muted -->
            <path d="M12 20 L10.5 12 L12 13.5 L13.5 12 Z" fill="currentColor" opacity="0.35"/>
            <circle cx="12" cy="12" r="1.5" fill="currentColor" opacity="0.7"/>
          </svg>
        </button>
        <button id="btn-3d" class="icon-btn" title="3D view" aria-label="Toggle 3D terrain view">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="btn-panel" class="icon-btn" title="Settings" aria-label="Open settings panel">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Sun shadow time bar (slides down below topbar when active) -->
    <div id="shadow-bar" class="hidden" aria-label="Sun shadow time controls">
      <div class="shadow-top">
        <input type="date" id="shadow-date" class="shadow-date-input" aria-label="Shadow date">
        <span id="shadow-alt" class="shadow-alt" title="Sun altitude above horizon"></span>
      </div>
      <div id="shadow-timeline" class="shadow-timeline"
           role="slider" tabindex="0"
           aria-valuemin="0" aria-valuemax="1439" aria-valuenow="720"
           aria-label="Time of day">
        <div class="shadow-tl-track">
          <div id="shadow-tl-thumb" class="shadow-tl-thumb">
            <span id="shadow-time-label" class="shadow-tl-bubble" aria-live="polite">12:00</span>
          </div>
        </div>
        <div class="shadow-tl-marks" aria-hidden="true">
          <span>0h</span><span>3h</span><span>6h</span><span>9h</span>
          <span>12h</span><span>15h</span><span>18h</span><span>21h</span><span>24h</span>
        </div>
      </div>
    </div>

    <!-- Zoom info hint -->
    <div id="zoom-hint" class="hidden">Zoom in to calculate slopes</div>

    <!-- Loading indicator -->
    <div id="loading-indicator" class="hidden">
      <div class="loading-bar"></div>
    </div>

    <!-- Bottom panel -->
    <div id="panel" class="panel-collapsed">
      <div id="panel-drag" role="button" tabindex="0" aria-label="Drag to expand panel">
        <div id="panel-handle"></div>
      </div>

      <div id="panel-body">

        <!-- Slope overlay toggle -->
        <div class="control-row">
          <div class="control-label">
            <span class="label-text">Slope Overlay</span>
            <span class="label-sub">Colour-coded steepness</span>
          </div>
          <label class="toggle" aria-label="Toggle slope overlay">
            <input type="checkbox" id="toggle-slope">
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
          </label>
        </div>

        <!-- Slope range controls -->
        <div id="slope-controls" class="control-section disabled">
          <div class="section-header">
            <span class="section-title">Slope Range</span>
            <span id="slope-range-display" class="section-value">15° – 45°</span>
          </div>
          <div class="dual-range-wrap">
            <div class="dual-range-track">
              <div id="range-fill" class="range-fill"></div>
            </div>
            <input type="range" id="min-slope" class="range-input range-min"
                   min="0" max="60" value="15" step="1" aria-label="Minimum slope angle">
            <input type="range" id="max-slope" class="range-input range-max"
                   min="0" max="60" value="45" step="1" aria-label="Maximum slope angle">
          </div>
          <div class="range-labels">
            <span>0°</span><span>15°</span><span>30°</span><span>45°</span><span>60°</span>
          </div>

          <!-- Legend -->
          <div class="legend">
            <div class="legend-item">
              <span class="legend-swatch" style="background: var(--slope-a)"></span>
              <span>15 – 25° Beginner</span>
            </div>
            <div class="legend-item">
              <span class="legend-swatch" style="background: var(--slope-b)"></span>
              <span>25 – 30° Intermediate</span>
            </div>
            <div class="legend-item">
              <span class="legend-swatch" style="background: var(--slope-c)"></span>
              <span>30 – 38° Advanced</span>
            </div>
            <div class="legend-item">
              <span class="legend-swatch" style="background: var(--slope-d)"></span>
              <span>38° + Expert</span>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Base map selector -->
        <div class="control-row">
          <div class="control-label">
            <span class="label-text">Base Map</span>
          </div>
          <select id="basemap-select" aria-label="Select base map">
            <option value="mml-topo">Finland – NLS Topographic</option>
            <option value="mml-bg">Finland – NLS Background</option>
            <option value="no-topo">Scandinavia – OpenTopoMap</option>
            <option value="no-gray">Scandinavia – Grayscale</option>
            <option value="kv-topo">Norway – Kartverket Topo</option>
            <option value="kv-gray">Norway – Kartverket Gray</option>
            <option value="osm">OpenStreetMap</option>
          </select>
        </div>

        <div class="divider"></div>

        <!-- NLS API key section -->
        <div class="control-section" id="api-section">
          <div class="section-header">
            <span class="section-title">NLS Finland API Key</span>
            <span id="api-status" class="api-badge api-none">Not set</span>
          </div>
          <div class="api-input-row">
            <input type="text" id="api-key-input"
                   placeholder="Paste your API key here"
                   autocomplete="off" autocorrect="off" spellcheck="false"
                   aria-label="NLS Finland API key">
            <button id="btn-save-key" class="btn-primary" aria-label="Save API key">Save</button>
          </div>
          <a href="https://www.maanmittauslaitos.fi/rajapinnat/api-avaimen-ohje"
             target="_blank" rel="noopener noreferrer" class="api-link">
            Get a free API key from Maanmittauslaitos &rarr;
          </a>
        </div>

      </div>
    </div>

    <!-- Tap-to-inspect slope value tooltip -->
    <div id="slope-tip" class="hidden" role="tooltip"></div>

  </div>

  <script src="leaflet.js"></script>
  <script src="maplibre-gl.js"></script>
  <script src="app.js"></script>
  <noscript>
    <p style="padding:2rem;color:#f0f4f8;background:#0d1b2a;font-family:sans-serif">
      PowSurf requires JavaScript to run. Please enable JavaScript in your browser.
    </p>
  </noscript>
</body>
</html>
